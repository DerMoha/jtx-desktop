name: Build Native Distributions

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: macos-dmg
            gradle_task: packageDmg
            artifact_path: build/compose/binaries/main/dmg/*.dmg
          - os: windows-latest
            artifact_name: windows-exe
            gradle_task: packageExe
            artifact_path: build/compose/binaries/main/exe/*.exe
          - os: ubuntu-latest
            artifact_name: linux-packages
            gradle_task: packageDeb packageRpm
            artifact_path: |
              build/compose/binaries/main/deb/*.deb
              build/compose/binaries/main/rpm/*.rpm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native distribution
        shell: bash
        run: ./gradlew ${{ matrix.gradle_task }}

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  windows-portable:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build portable app image
        shell: bash
        run: ./gradlew createDistributable

      - name: Archive portable Windows app
        shell: pwsh
        run: |
          $appDir = "build/compose/binaries/main/app/jtx-desktop"
          $zipPath = "build/compose/binaries/main/app/jtx-desktop-windows-portable.zip"
          if (-not (Test-Path $appDir)) {
            throw "Portable app directory not found: $appDir"
          }
          Compress-Archive -Path "$appDir\*" -DestinationPath $zipPath -Force

      - name: Upload portable Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: build/compose/binaries/main/app/jtx-desktop-windows-portable.zip
          if-no-files-found: error
