name: Build Native Distributions

on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build macOS app
        shell: bash
        run: ./gradlew createDistributable

      - name: Archive macOS app
        shell: bash
        run: |
          appDir="build/compose/binaries/main/app/jtx-desktop.app"
          zipPath="build/compose/binaries/main/app/jtx-desktop-macos.zip"
          cd "$(dirname "$appDir")"
          zip -r "$zipPath" "$(basename "$appDir")" -x "*.DS_Store"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/compose/binaries/main/app/jtx-desktop-macos.zip
          if-no-files-found: error

  windows:
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows app
        shell: bash
        run: ./gradlew createDistributable

      - name: Archive Windows app
        shell: pwsh
        run: |
          $appDir = "build/compose/binaries/main/app/jtx-desktop"
          $zipPath = "build/compose/binaries/main/app/jtx-desktop-windows-portable.zip"
          if (-not (Test-Path $appDir)) {
            throw "App directory not found: $appDir"
          }
          Compress-Archive -Path "$appDir\*" -DestinationPath $zipPath -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/compose/binaries/main/app/jtx-desktop-windows-portable.zip
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Linux app
        shell: bash
        run: ./gradlew createDistributable

      - name: Archive Linux app
        shell: bash
        run: |
          appDir="build/compose/binaries/main/app/jtx-desktop"
          zipPath="build/compose/binaries/main/app/jtx-desktop-linux.tar.gz"
          tar -czf "$zipPath" -C "$(dirname "$appDir")" "$(basename "$appDir")"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/compose/binaries/main/app/jtx-desktop-linux.tar.gz
          if-no-files-found: error